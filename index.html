<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#101418">
<title>Travel Helper</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root {
    --bg: #101418; --panel: #1a2027; --panel2: #232b34;
    --line: #303a45; --text: #e8edf2; --dim: #8fa0b0;
    --accent: #ff8a00; --accent2: #ffb35c; --ok: #37c871; --warn: #ffcf40; --bad: #ff5c5c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border-bottom: 2px solid var(--line);
    background: var(--panel);
  }
  header h1 { font-size: 17px; letter-spacing: 1.5px; text-transform: uppercase; flex: 1; }
  header h1 span { color: var(--accent); }
  .hbtn {
    border: 1px solid var(--line); background: var(--panel2); color: var(--text);
    border-radius: 8px; padding: 8px 12px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .hbtn.on { border-color: var(--accent); color: var(--accent); }
  main { flex: 1; overflow-y: auto; padding: 14px; padding-bottom: 90px; }
  .view { display: none; }
  .view.active { display: block; }

  /* ---- TRIP VIEW ---- */
  .stepmeta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .stepnum { font-size: 12px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
  .dirchip { font-size: 12px; font-weight: 800; letter-spacing: 1px; color: var(--accent); border: 1px solid var(--accent); border-radius: 999px; padding: 3px 10px; }
  .phasecard {
    background: var(--panel); border: 1px solid var(--line); border-left: 6px solid var(--accent);
    border-radius: 12px; padding: 18px 16px; margin-bottom: 12px;
  }
  .phasecard h2 { font-size: 26px; line-height: 1.15; margin-bottom: 10px; }
  .phasecard p { font-size: 17px; line-height: 1.45; color: var(--text); margin-bottom: 10px; }
  .phasecard p.sub { color: var(--dim); font-size: 14px; }
  .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
  .abtn {
    flex: 1 1 130px; text-align: center; text-decoration: none; cursor: pointer;
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 10px; padding: 14px 10px; font-size: 15px; font-weight: 700;
  }
  .abtn.primary { background: var(--accent); border-color: var(--accent); color: #14100a; }
  .navrow { display: flex; gap: 10px; margin-bottom: 14px; }
  .navrow button {
    flex: 1; padding: 16px; font-size: 17px; font-weight: 800; border-radius: 12px;
    border: 1px solid var(--line); background: var(--panel2); color: var(--text); cursor: pointer;
  }
  .navrow button.next { background: var(--accent); border-color: var(--accent); color: #14100a; flex: 2; }
  .phaselist { list-style: none; }
  .phaselist li {
    padding: 9px 12px; border-left: 3px solid var(--line); color: var(--dim);
    font-size: 14px; cursor: pointer;
  }
  .phaselist li.done { border-left-color: var(--ok); color: var(--dim); text-decoration: line-through; }
  .phaselist li.now { border-left-color: var(--accent); color: var(--text); font-weight: 800; background: var(--panel); }
  .geobanner {
    display: none; background: var(--panel); border: 1px solid var(--warn);
    border-radius: 10px; padding: 10px 12px; font-size: 14px; margin-bottom: 12px; color: var(--warn);
  }
  .geobanner.show { display: block; }
  .timechip {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 10px; font-size: 15px;
  }
  .timechip .tgt { color: var(--dim); }
  .timechip .tgt b { color: var(--text); }
  .timechip .buf { font-weight: 800; font-size: 17px; white-space: nowrap; }
  .buf.ok { color: var(--ok); }
  .buf.tight { color: var(--warn); }
  .buf.late { color: var(--bad); }
  .phaselist li .by { float: right; color: var(--dim); font-size: 12px; }

  /* the one glowing green button = push this next */
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(55, 200, 113, 0.65); }
    50% { box-shadow: 0 0 0 14px rgba(55, 200, 113, 0); }
  }
  .glow {
    background: var(--ok) !important; border-color: var(--ok) !important;
    color: #08130c !important; animation: pulseGlow 1.5s infinite;
  }

  /* permanent boarding countdown — always on screen once times are set */
  #boardBar {
    display: none; align-items: center; justify-content: space-between; gap: 12px;
    padding: 8px 14px; background: #0b0e12; border-bottom: 2px solid var(--line);
  }
  #boardBar .lbl { font-size: 11px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
  #boardBar .lbl b { color: var(--text); display: block; font-size: 13px; letter-spacing: 1px; }
  #boardBar .clock { font-family: Consolas, 'Courier New', monospace; font-size: 30px; font-weight: 800; letter-spacing: 1px; }
  #boardBar .clock.ok { color: var(--ok); }
  #boardBar .clock.tight { color: var(--warn); }
  #boardBar .clock.late { color: var(--bad); animation: pulseGlow 1.2s infinite; border-radius: 8px; padding: 0 6px; }
  .bm-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .bm-verdict { margin-top: 10px; font-size: 16px; font-weight: 800; }
  .bm-verdict.win { color: var(--ok); }
  .bm-verdict.lose { color: var(--warn); }

  /* ---- HUB VIEW ---- */
  .hubgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .hubbtn {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 8px; text-decoration: none; color: var(--text); font-weight: 700; font-size: 15px;
    text-align: center; cursor: pointer;
  }
  .hubbtn .ico { font-size: 26px; }
  .hubbtn.waze { border-color: var(--accent); }
  .sectionhead { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin: 16px 0 8px; }
  .wxcard {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px; margin-bottom: 10px;
  }
  .wxcard h3 { font-size: 15px; margin-bottom: 6px; color: var(--accent2); }
  .wxcard p { font-size: 14px; line-height: 1.4; color: var(--text); }
  .wxcard .alert { color: var(--bad); font-weight: 700; margin-top: 6px; font-size: 14px; }
  .wxcard .dim { color: var(--dim); font-size: 13px; }

  /* ---- SETUP VIEW ---- */
  fieldset { border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
  legend { padding: 0 8px; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-weight: 800; }
  label { display: block; font-size: 13px; color: var(--dim); margin: 10px 0 4px; }
  input, select, textarea {
    width: 100%; padding: 12px; font-size: 16px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--panel2); color: var(--text);
  }
  textarea { resize: vertical; font-family: inherit; }
  input::placeholder { color: #5c6b7a; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .savebtn {
    width: 100%; padding: 16px; font-size: 17px; font-weight: 800; border-radius: 12px;
    border: none; background: var(--accent); color: #14100a; cursor: pointer; margin-bottom: 8px;
  }
  .note { font-size: 13px; color: var(--dim); line-height: 1.4; }

  /* ---- TABS ---- */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    background: var(--panel); border-top: 2px solid var(--line);
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav button {
    flex: 1; padding: 14px 0 12px; background: none; border: none; color: var(--dim);
    font-size: 13px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
    border-top: 3px solid transparent;
  }
  nav button.active { color: var(--accent); border-top-color: var(--accent); }
  .empty { text-align: center; color: var(--dim); padding: 50px 20px; font-size: 16px; line-height: 1.5; }
  .empty .big { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <h1>Travel<span>Helper</span></h1>
  <button class="hbtn" id="cloudBtn" onclick="syncNow()" title="Cloud sync">☁</button>
  <button class="hbtn" id="dirBtn" onclick="toggleDirection()">OUT</button>
  <button class="hbtn" id="voiceBtn" onclick="toggleVoice()">🔊</button>
</header>

<div id="boardBar"></div>

<main>
  <!-- TRIP -->
  <section class="view active" id="view-trip">
    <div class="geobanner" id="geoBanner"></div>
    <div id="tripContent"></div>
  </section>

  <!-- HUB -->
  <section class="view" id="view-hub">
    <div id="hubContent"></div>
  </section>

  <!-- SETUP -->
  <section class="view" id="view-setup">
    <fieldset>
      <legend>✨ Paste a Confirmation</legend>
      <label>Southwest, rental, or hotel confirmation email — paste it, AI fills the form below</label>
      <textarea id="f_paste" rows="5" placeholder="Copy the confirmation email from Gmail and paste the whole thing here. One at a time or all three stacked together — both work."></textarea>
      <button class="savebtn" style="margin-top:10px" onclick="aiFill()">FILL FROM EMAIL</button>
      <div class="note" id="aiStatus"></div>
      <label>Anthropic API key (one time — stays on this phone)</label>
      <input id="f_apikey" type="password" placeholder="sk-ant-...">
    </fieldset>
    <fieldset>
      <legend>Flight</legend>
      <div class="row2">
        <div><label>From (airport code)</label><select id="f_from"></select></div>
        <div><label>To (airport code)</label><select id="f_to"></select></div>
      </div>
      <div class="row2">
        <div><label>Airline</label><select id="f_airline"></select></div>
        <div><label>Flight # outbound</label><input id="f_flightOut" placeholder="e.g. 1234"></div>
      </div>
      <div class="row2">
        <div><label>Flight # return</label><input id="f_flightRet" placeholder="e.g. 5678"></div>
        <div><label>TSA PreCheck?</label><select id="f_precheck"><option value="yes">Yes</option><option value="no">No</option></select></div>
      </div>
      <div class="row2">
        <div><label>Departure date (outbound)</label><input id="f_depDateOut" type="date"></div>
        <div><label>Departure time (outbound)</label><input id="f_depTimeOut" type="time"></div>
      </div>
      <div class="row2">
        <div><label>Departure date (return)</label><input id="f_depDateRet" type="date"></div>
        <div><label>Departure time (return)</label><input id="f_depTimeRet" type="time"></div>
      </div>
      <div class="row2">
        <div><label>Overweight bag (50+ lb)?</label><select id="f_heavyBag"><option value="no">No</option><option value="yes">Yes</option></select></div>
        <div></div>
      </div>
    </fieldset>
    <fieldset>
      <legend>Rental Car</legend>
      <div class="row2">
        <div><label>Company</label><select id="f_rental"></select></div>
        <div><label>Confirmation #</label><input id="f_rentalConf" placeholder="optional"></div>
      </div>
    </fieldset>
    <fieldset>
      <legend>Hotel</legend>
      <label>Hotel name</label><input id="f_hotelName" placeholder="e.g. Hampton Inn Tampa Airport">
      <label>Hotel address (this feeds Waze)</label><input id="f_hotelAddr" placeholder="street, city, state">
      <label>Confirmation #</label><input id="f_hotelConf" placeholder="optional">
    </fieldset>
    <fieldset>
      <legend>Home Base</legend>
      <label>Home address (Waze destination after the return flight)</label>
      <input id="f_homeAddr" placeholder="optional — e.g. KOA Las Vegas">
    </fieldset>
    <button class="savebtn" onclick="saveTrip()">SAVE TRIP</button>
    <p class="note">Trip syncs to the cloud (☁ up top) — save here, it shows up on the other device. The API key is the one thing that does NOT sync: paste it once per device. Playbooks loaded for: <span id="airportList"></span>. New airports get added as you fly to them.</p>
  </section>
</main>

<nav>
  <button id="tab-trip" class="active" onclick="showView('trip')">Trip</button>
  <button id="tab-hub" onclick="showView('hub')">Hub</button>
  <button id="tab-setup" onclick="showView('setup')">Setup</button>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="airports.js"></script>
<script>
// =========================================================
// STATE
// =========================================================
let trip = null;            // saved trip form
let state = { dir: 'out', phase: 0, voice: true };
let phases = [];
let lastSpokenPhase = -1;
let geoWatchId = null;
let geoFired = { depart: false, arrive: false };
let lastPos = null;

function loadAll() {
  try { trip = JSON.parse(localStorage.getItem('th_trip')); } catch (e) { trip = null; }
  try { const s = JSON.parse(localStorage.getItem('th_state')); if (s) state = s; } catch (e) {}
}
function saveState() { localStorage.setItem('th_state', JSON.stringify(state)); }

// =========================================================
// CLOUD SYNC — same Firebase project as Job Tracker.
// Syncs the TRIP FILE between phone and Surface Pro.
// The Anthropic API key is NOT synced on purpose — the cloud
// path is readable if someone knows the project ID, and an
// API key in there means someone else billing your account.
// Key gets pasted once per device instead.
// =========================================================
const firebaseConfig = {
  apiKey: "AIzaSyDsx-VoWLfIqpKuYUaDsp0MFlc-24xwH8s",
  authDomain: "mistamerica-job-tracker.firebaseapp.com",
  projectId: "mistamerica-job-tracker",
  storageBucket: "mistamerica-job-tracker.firebasestorage.app",
  messagingSenderId: "491853979701",
  appId: "1:491853979701:web:64da6ffeb49e9c6e4d517c"
};
let cloudDoc = null;
try {
  if (typeof firebase !== 'undefined' && firebase.initializeApp) {
    firebase.initializeApp(firebaseConfig);
    cloudDoc = firebase.firestore().collection('users').doc('lyle-mistamerica')
      .collection('travel').doc('trip');
  }
} catch (e) { console.warn('Firebase init failed:', e); }

function localSavedAt() { return parseInt(localStorage.getItem('th_tripSavedAt') || '0', 10); }
function setCloudDot(cls, title) {
  const b = document.getElementById('cloudBtn');
  if (!b) return;
  b.style.color = cls === 'ok' ? 'var(--ok)' : cls === 'busy' ? 'var(--warn)' : cls === 'err' ? 'var(--bad)' : 'var(--dim)';
  b.title = title || 'Cloud sync';
}
async function pushCloudTrip() {
  if (!cloudDoc || !trip) return;
  try {
    setCloudDot('busy', 'Pushing…');
    await cloudDoc.set({ trip, updatedAt: localSavedAt() || Date.now() });
    setCloudDot('ok', 'Synced');
  } catch (e) { console.warn('cloud push failed', e); setCloudDot('err', 'Sync error: ' + (e.code || e.message)); }
}
async function pullCloudTrip() {
  if (!cloudDoc) return false;
  try {
    setCloudDot('busy', 'Pulling…');
    const snap = await cloudDoc.get();
    if (snap.exists) {
      const d = snap.data();
      if (d && d.trip && (d.updatedAt || 0) > localSavedAt()) {
        trip = d.trip;
        localStorage.setItem('th_trip', JSON.stringify(trip));
        localStorage.setItem('th_tripSavedAt', String(d.updatedAt));
        buildPhases(); renderHeader(); renderTrip(); renderHub(); fillForm();
        banner('☁ Trip updated from the cloud (edited on your other device).');
        setCloudDot('ok', 'Synced — pulled newer trip');
        return true;
      }
    }
    setCloudDot('ok', 'Synced');
  } catch (e) { console.warn('cloud pull failed', e); setCloudDot('err', 'Sync error: ' + (e.code || e.message)); }
  return false;
}
async function syncNow() {
  const pulled = await pullCloudTrip();
  if (!pulled && trip) await pushCloudTrip();
}

// =========================================================
// PHASE ENGINE — builds the assembly line for current leg
// =========================================================
function buildPhases() {
  phases = [];
  if (!trip) return;
  const out = state.dir === 'out';
  const depCode = out ? trip.from : trip.to;
  const arrCode = out ? trip.to : trip.from;
  const dep = AIRPORTS[depCode], arr = AIRPORTS[arrCode];
  const al = AIRLINES[trip.airline] || { name: trip.airline, appUrl: null };
  const flight = out ? trip.flightOut : trip.flightRet;
  const rental = RENTALS[trip.rental];
  if (!dep || !arr) return;

  const pick = (obj, key) => (obj && (obj[key] || obj.default)) || '';
  const alBtn = al.appUrl ? [{ label: al.name + ' App', url: al.appUrl }] : [];
  // Live flight status — FlightAware public page, no key needed (SWA1234 style)
  const fsBtn = (al.icao && flight) ? [{ label: '📡 Flight Status', url: 'https://www.flightaware.com/live/flight/' + al.icao + flight }] : [];

  if (out || !rental) {
    phases.push({
      id: 'drive', title: 'Head to ' + dep.code,
      lines: [dep.name + ', ' + dep.city + '.', pick(dep.departure.parking, trip.airline)],
      voice: 'Heading to ' + dep.name + '. ' + pick(dep.departure.parking, trip.airline),
      actions: [{ label: 'Waze to ' + dep.code, url: wazeUrl(dep.name + ' ' + dep.city) }]
    });
  } else {
    phases.push({
      id: 'drive', title: 'Return the Rental',
      lines: ['Head to ' + dep.name + '.', dep.departure.rentalReturn || 'Follow Rental Car Return signs at the airport.'],
      voice: 'Heading to ' + dep.name + '. ' + (dep.departure.rentalReturn || ''),
      actions: [{ label: 'Waze to ' + dep.code, url: wazeUrl(dep.name + ' rental car return ' + dep.city) }]
    });
  }
  const heavy = trip.heavyBag === 'yes';
  const skycap = dep.departure.skycap || '';
  phases.push({
    id: 'checkin', title: 'Check In / Bag Drop',
    lines: [pick(dep.departure.checkin, trip.airline),
      heavy && skycap ? '💪 Heavy bag: ' + skycap : (skycap || ''),
      heavy ? 'Overweight fee applies on top of the bag fee regardless of fare class — 51–70 lb runs about $100 on Southwest.' : '',
      flight ? al.name + ' flight ' + flight + '.' : ''],
    voice: pick(dep.departure.checkin, trip.airline) + (heavy && skycap ? ' Heavy bag tip: ' + skycap : ''),
    actions: alBtn
  });
  phases.push({
    id: 'security', title: 'Security' + (trip.precheck === 'yes' ? ' — PreCheck' : ''),
    lines: [trip.precheck === 'yes' ? dep.departure.security.precheck : dep.departure.security.standard],
    voice: trip.precheck === 'yes' ? dep.departure.security.precheck : dep.departure.security.standard,
    actions: [{ label: 'Wait Times', url: dep.waitTimesUrl }]
  });
  phases.push({
    id: 'gate', title: 'To Your Gate',
    lines: [pick(dep.departure.gates, trip.airline)],
    voice: pick(dep.departure.gates, trip.airline),
    actions: alBtn.concat(fsBtn)
  });
  phases.push({
    id: 'board', title: 'Boarding',
    lines: ['Pull up your boarding pass.', flight ? al.name + ' ' + flight + ' to ' + arr.city + '.' : ''],
    voice: 'Time to board. Pull up your boarding pass in the ' + al.name + ' app.',
    actions: alBtn.concat(fsBtn)
  });
  phases.push({
    id: 'flight', title: 'In Flight ✈ ' + arr.code,
    lines: ['Next stop ' + arr.name + '.', 'When you land, hit NEXT (or keep the app open — GPS flips it for you) and I\'ll walk you to baggage and the rental car.'],
    voice: 'Have a good flight. When you land in ' + arr.city + ', I\'ll take it from there.',
    actions: fsBtn
  });
  phases.push({
    id: 'deplane', title: 'Welcome to ' + arr.city,
    lines: [arr.arrival.toBaggage],
    voice: 'Welcome to ' + arr.city + '. ' + arr.arrival.toBaggage,
    actions: [
      { label: '📰 ' + arr.city + ' News', url: newsUrl(arr) },
      { label: '📰 National News', url: 'https://news.google.com/' }
    ]
  });
  phases.push({
    id: 'baggage', title: 'Baggage Claim',
    lines: [arr.arrival.baggage],
    voice: arr.arrival.baggage,
    actions: []
  });
  if (out) {
    phases.push({
      id: 'rental', title: 'Rental Car',
      lines: [arr.arrival.toRental,
        rental ? 'Your car: ' + rental.name + (trip.rentalConf ? ' — conf # ' + trip.rentalConf : '') + '.' : ''],
      voice: arr.arrival.toRental + (rental ? ' Your rental is with ' + rental.name + '.' : ''),
      actions: rental ? [{ label: rental.name, url: rental.url }] : []
    });
  } else {
    phases.push({
      id: 'rental', title: 'Get Your Truck',
      lines: [arr.arrival.toParking || 'Head back to where you parked.'],
      voice: arr.arrival.toParking || 'Head back to your truck.',
      actions: []
    });
  }
  const wazeDest = out ? (trip.hotelAddr || trip.hotelName) : (trip.homeAddr || null);
  const destLabel = out ? (trip.hotelName || trip.hotelAddr) : (trip.homeAddr ? 'home' : null);
  phases.push({
    id: 'waze', title: 'Hit the Road',
    lines: [destLabel
      ? 'Handing you off to Waze — destination loaded: ' + destLabel + '.'
      : 'Handing you off to Waze.',
      (out && trip.hotelConf) ? 'Hotel conf # ' + trip.hotelConf + '.' : ''],
    voice: destLabel ? 'You\'re rolling. Handing off to Waze, headed to ' + destLabel + '.' : 'You\'re rolling. Handing off to Waze.',
    actions: [{ label: '🚗 OPEN WAZE', url: wazeUrl(wazeDest || arr.city), primary: true }]
  });
  phases.push({
    id: 'done', title: out ? 'Trip Complete' : 'Home Safe',
    lines: [out ? 'You made it. Flip the toggle to RET when it\'s time to head home.' : 'Round trip done. Nice work.'],
    voice: out ? 'You made it.' : 'Home safe. Round trip done.',
    actions: []
  });
  buildSchedule();
}

function wazeUrl(q) { return 'https://waze.com/ul?q=' + encodeURIComponent(q) + '&navigate=yes'; }
function newsUrl(ap) { return 'https://news.google.com/search?q=' + encodeURIComponent(ap.city + ' ' + (ap.state || '') + ' when:1d'); }

// Spoken landing weather — fires when you hit the deplane phase.
// Pulls the destination NWS forecast and reads it in your buds.
async function speakArrivalWx() {
  const out = state.dir === 'out';
  const arr = AIRPORTS[out ? trip.to : trip.from];
  if (!arr) return;
  try {
    const pt = await (await fetch('https://api.weather.gov/points/' + arr.lat + ',' + arr.lon)).json();
    const fc = await (await fetch(pt.properties.forecast)).json();
    const p = fc.properties.periods[0];
    let txt = 'Weather in ' + arr.city + ': ' + p.temperature + ' degrees, ' + p.shortForecast.toLowerCase() + '.';
    try {
      const al = await (await fetch('https://api.weather.gov/alerts/active?point=' + arr.lat + ',' + arr.lon)).json();
      if (al.features && al.features.length) txt += ' Heads up — active alert: ' + al.features[0].properties.event + '.';
    } catch (e) {}
    // still on the deplane card? pin the line to it so it's readable too
    if (phases[state.phase] && phases[state.phase].id === 'deplane') {
      phases[state.phase].lines.push('🌤 ' + txt);
      renderTrip();
    }
    speak(txt);
  } catch (e) { /* no signal yet — weather is a bonus, not a blocker */ }
}

// =========================================================
// SCHEDULE — works backward from departure time.
// Each station gets a "be here by" deadline + live buffer.
// =========================================================
let schedule = {};
function buildSchedule() {
  schedule = {};
  if (!trip) return;
  const out = state.dir === 'out';
  const depTime = out ? trip.depTimeOut : trip.depTimeRet;
  const dep = AIRPORTS[out ? trip.from : trip.to];
  if (!depTime || !dep) return;
  const t = dep.times || {};
  const bag = t.bagDrop || 15;
  const sec = trip.precheck === 'yes' ? (t.securityPre || 15) : (t.securityStd || 30);
  const walk = t.toGate || 20;
  const rentalDrop = (!out && trip.rental) ? (t.rentalReturn || 20) : 0;
  const [h, m] = depTime.split(':').map(Number);
  // Anchor to the actual flight DATE (not "today") — otherwise the countdown
  // screams BEHIND the night before and the return leg is wrong all week.
  const dStr = out ? trip.depDateOut : trip.depDateRet;
  let depDate;
  if (dStr) {
    const [Y, Mo, D] = dStr.split('-').map(Number);
    depDate = new Date(Y, Mo - 1, D, h, m, 0, 0);
  } else {
    depDate = new Date(); depDate.setHours(h, m, 0, 0); // no date saved — old behavior
  }
  const minus = n => new Date(depDate.getTime() - n * 60000);
  const BOARD = 30; // boarding starts ~30 min before departure
  schedule = {
    drive:    { label: rentalDrop ? 'Car dropped by' : 'At the airport by', at: minus(BOARD + walk + sec + bag) },
    checkin:  { label: 'Bags dropped by',    at: minus(BOARD + walk + sec) },
    security: { label: 'Through security by', at: minus(BOARD + walk) },
    gate:     { label: 'At your gate by',    at: minus(BOARD) },
    board:    { label: 'Boarding starts',    at: minus(BOARD) },
    flight:   { label: 'Wheels up',          at: depDate }
  };
  if (rentalDrop) schedule.drive.at = minus(BOARD + walk + sec + bag + rentalDrop);
}
function fmtClock(d) { return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); }
function bufferInfo(at) {
  const mins = Math.round((at - Date.now()) / 60000);
  const abs = Math.abs(mins);
  const txt = (abs >= 60 ? Math.floor(abs / 60) + 'h ' + (abs % 60) + 'm' : abs + ' min');
  if (mins < 0) return { cls: 'late', txt: txt + ' BEHIND', mins };
  if (mins <= 15) return { cls: 'tight', txt: txt + ' left', mins };
  return { cls: 'ok', txt: '+' + txt, mins };
}
function bufferVoice(at) {
  const mins = Math.round((at - Date.now()) / 60000);
  if (mins < 0) return 'Heads up — you\'re running about ' + Math.abs(mins) + ' minutes behind. Tighten it up.';
  if (mins <= 15) return 'You\'ve got about ' + mins + ' minutes — keep it moving.';
  const h = Math.floor(mins / 60), r = mins % 60;
  return 'You\'ve got ' + (h ? h + (h === 1 ? ' hour ' : ' hours ') + (r ? r + ' minutes' : '') : mins + ' minutes') + ' of cushion.';
}
function renderTimeChip() {
  const el = document.getElementById('timeChip');
  if (!el || !phases.length) return;
  const pid = phases[state.phase].id;
  const s = schedule[pid];
  if (!s) { el.style.display = 'none'; return; }
  let label = s.label, at = s.at, extra = '';
  // On the drive phase, fold in a rough drive-time estimate from wherever you are
  if (pid === 'drive' && lastPos) {
    const out = state.dir === 'out';
    const dep = AIRPORTS[out ? trip.from : trip.to];
    const miles = distKm(lastPos.lat, lastPos.lon, dep.lat, dep.lon) * 0.621;
    if (miles > 1 && miles < 150) {
      const driveMin = Math.max(5, Math.round(miles * 2)); // ~30 mph average, rough
      at = new Date(s.at.getTime() - driveMin * 60000);
      label = 'Leave by';
      extra = '<div style="width:100%;font-size:13px;color:var(--dim)">📍 ' + miles.toFixed(1) +
        ' mi out, ~' + driveMin + ' min drive (rough — tap Waze for the real ETA)</div>';
    }
  }
  const b = bufferInfo(at);
  el.style.display = 'flex';
  el.style.flexWrap = 'wrap';
  el.innerHTML = '<span class="tgt">' + label + ' <b>' + fmtClock(at) + '</b></span>' +
    '<span class="buf ' + b.cls + '">' + (b.cls === 'late' ? '⚠ ' : '⏱ ') + b.txt + '</span>' + extra;
}
setInterval(renderTimeChip, 30000);

// Permanent boarding countdown — ticks every second, shows anywhere
function renderBoardBar() {
  const bar = document.getElementById('boardBar');
  if (!schedule.board || !trip) { bar.style.display = 'none'; return; }
  const at = schedule.board.at;
  if (Date.now() > schedule.flight.at.getTime() + 45 * 60000) { bar.style.display = 'none'; return; }
  if (at - Date.now() > 24 * 3600000) { bar.style.display = 'none'; return; } // >24h out — no countdown noise yet
  const ms = at - Date.now();
  const late = ms < 0, abs = Math.abs(ms);
  const h = Math.floor(abs / 3600000), m = Math.floor(abs % 3600000 / 60000), s = Math.floor(abs % 60000 / 1000);
  const pad = n => String(n).padStart(2, '0');
  const txt = late ? 'BOARD NOW' : (h ? h + ':' + pad(m) + ':' + pad(s) : m + ':' + pad(s));
  const cls = late ? 'late' : (ms < 30 * 60000 ? 'tight' : 'ok');
  const out = state.dir === 'out';
  const route = out ? trip.from + ' → ' + trip.to : trip.to + ' → ' + trip.from;
  bar.style.display = 'flex';
  bar.innerHTML = '<span class="lbl">Boarding ' + fmtClock(at) + '<b>' + route + '</b></span>' +
    '<span class="clock ' + cls + '">' + txt + '</span>';
}
setInterval(renderBoardBar, 1000);

// =========================================================
// VOICE
// =========================================================
function speak(text) {
  if (!state.voice || !('speechSynthesis' in window) || !text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.0;
  speechSynthesis.speak(u);
}
function toggleVoice() {
  state.voice = !state.voice;
  if (!state.voice) speechSynthesis.cancel();
  saveState(); renderHeader();
}

// =========================================================
// WATCH / NOTIFICATIONS — each phase change posts a notification
// with a NEXT button. Galaxy Watch mirrors it: tap NEXT on the
// wrist, the phone advances and the next prompt hits the buds.
// =========================================================
async function notifyPhase(p, sched) {
  try {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const reg = await navigator.serviceWorker.getRegistration();
    if (!reg || !reg.showNotification) return;
    const body = (sched ? sched.label + ' ' + fmtClock(sched.at) + ' — ' : '') + (p.lines[0] || '');
    reg.showNotification('Step ' + (state.phase + 1) + ': ' + p.title, {
      body: body.slice(0, 120),
      tag: 'th-phase',            // replaces the previous phase card on the wrist
      icon: 'icons/icon-192.png',
      badge: 'icons/icon-192.png',
      actions: [
        { action: 'next', title: 'NEXT ▸' },
        { action: 'say', title: '🔊 SAY IT' }
      ]
    });
  } catch (e) { /* notifications are a bonus, never break the flow */ }
}
function handleSwMessage(data) {
  if (!data || !phases.length) return;
  if (data.cmd === 'next') setPhase(state.phase + 1, true);
  if (data.cmd === 'say') {
    const s = schedule[phases[state.phase].id];
    speak(phases[state.phase].voice + (s ? ' ' + bufferVoice(s.at) : ''));
  }
}
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', e => handleSwMessage(e.data));
}

// =========================================================
// NAVIGATION
// =========================================================
function setPhase(i, announce) {
  state.phase = Math.max(0, Math.min(phases.length - 1, i));
  saveState();
  renderTrip();
  if (announce && state.phase !== lastSpokenPhase) {
    lastSpokenPhase = state.phase;
    const s = schedule[phases[state.phase].id];
    speak(phases[state.phase].voice + (s ? ' ' + bufferVoice(s.at) : ''));
    notifyPhase(phases[state.phase], s);
    if (phases[state.phase].id === 'deplane') speakArrivalWx();
  }
}
function toggleDirection() {
  state.dir = state.dir === 'out' ? 'ret' : 'out';
  state.phase = 0; lastSpokenPhase = -1;
  geoFired = { depart: false, arrive: false };
  saveState(); buildPhases(); renderHeader(); renderTrip(); renderHub();
}
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('tab-' + v).classList.add('active');
  if (v === 'hub') loadWeather();
}

// =========================================================
// RENDER
// =========================================================
function renderHeader() {
  document.getElementById('dirBtn').textContent = state.dir === 'out' ? 'OUT ▸' : '◂ RET';
  document.getElementById('dirBtn').classList.toggle('on', state.dir === 'ret');
  document.getElementById('voiceBtn').textContent = state.voice ? '🔊' : '🔇';
  document.getElementById('voiceBtn').classList.toggle('on', state.voice);
}

function renderTrip() {
  const el = document.getElementById('tripContent');
  if (!trip || !phases.length) {
    el.innerHTML = '<div class="empty"><div class="big">🧳</div>No trip loaded yet.<br>Hit <b>Setup</b> and fill in your trip.</div>';
    return;
  }
  const p = phases[state.phase];
  const dirLabel = state.dir === 'out' ? trip.from + ' → ' + trip.to : trip.to + ' → ' + trip.from;
  let html = '<div class="stepmeta"><span class="stepnum">Step ' + (state.phase + 1) + ' of ' + phases.length +
    '</span><span class="dirchip">' + dirLabel + '</span></div>';
  html += '<div class="timechip" id="timeChip" style="display:none"></div>';
  html += '<div class="phasecard"><h2>' + p.title + '</h2>';
  p.lines.filter(Boolean).forEach(l => html += '<p>' + l + '</p>');
  // ONE glowing green button = the next thing to push.
  // If this phase has a primary action (like OPEN WAZE), that glows; otherwise NEXT glows.
  const hasPrimary = p.actions.some(a => a.primary);
  if (p.actions.length) {
    html += '<div class="actions">';
    p.actions.forEach(a => {
      html += '<a class="abtn' + (a.primary ? ' primary glow' : '') + '" href="' + a.url + '" target="_blank" rel="noopener">' + a.label + '</a>';
    });
    html += '</div>';
  }
  html += '</div>';
  html += '<div class="navrow">' +
    '<button onclick="setPhase(state.phase-1,false)">◂ BACK</button>' +
    '<button onclick="speak(phases[state.phase].voice)">🔊 SAY IT</button>' +
    '<button class="next' + (hasPrimary ? '' : ' glow') + '" onclick="setPhase(state.phase+1,true)">NEXT ▸</button></div>';
  html += '<ul class="phaselist">';
  phases.forEach((ph, i) => {
    const cls = i < state.phase ? 'done' : (i === state.phase ? 'now' : '');
    const by = schedule[ph.id] ? '<span class="by">' + fmtClock(schedule[ph.id].at) + '</span>' : '';
    html += '<li class="' + cls + '" onclick="setPhase(' + i + ',true)">' + (i + 1) + '. ' + ph.title + by + '</li>';
  });
  html += '</ul>';
  el.innerHTML = html;
  renderTimeChip();
}

function renderHub() {
  const el = document.getElementById('hubContent');
  if (!trip) {
    el.innerHTML = '<div class="empty"><div class="big">🎛️</div>Set up a trip first — the Hub builds itself from your trip info.</div>';
    return;
  }
  const out = state.dir === 'out';
  const depCode = out ? trip.from : trip.to;
  const arrCode = out ? trip.to : trip.from;
  const dep = AIRPORTS[depCode], arr = AIRPORTS[arrCode];
  const al = AIRLINES[trip.airline];
  const rental = RENTALS[trip.rental];
  const wazeDest = trip.hotelAddr || trip.hotelName;

  const hubFlight = out ? trip.flightOut : trip.flightRet;
  let html = '<div class="sectionhead">Launch</div><div class="hubgrid">';
  if (al && al.appUrl) html += hub('✈️', al.name, al.appUrl);
  if (al && al.icao && hubFlight) html += hub('📡', 'Flight Status', 'https://www.flightaware.com/live/flight/' + al.icao + hubFlight);
  if (rental) html += hub('🚙', rental.name, rental.url);
  if (wazeDest) html += hub('🗺️', 'Waze → Hotel', wazeUrl(wazeDest), 'waze');
  if (trip.hotelName) html += hub('🏨', trip.hotelName, 'https://www.google.com/maps/search/' + encodeURIComponent(trip.hotelName + ' ' + (trip.hotelAddr || '')));
  if (dep) html += hub('🛂', depCode + ' Waits', dep.waitTimesUrl);
  if (arr) html += hub('🛬', arrCode + ' Map', arr.mapUrl);
  if (arr) html += hub('📰', arr.city + ' News', 'https://news.google.com/search?q=' + encodeURIComponent(arr.city + ' ' + regionOf(arr)));
  if (dep) html += hub('📰', dep.city + ' News', 'https://news.google.com/search?q=' + encodeURIComponent(dep.city + ' ' + regionOf(dep)));
  html += '</div>';

  // Bag Math — is the premium seat cheaper once bag fees are counted?
  const wn = trip.airline === 'WN';
  html += '<div class="sectionhead">Bag Math — coach + bag fees vs premium seat</div>' +
    '<div class="wxcard">' +
    '<div class="bm-row"><div><label>Coach fare $</label><input id="bm_coach" type="number" inputmode="decimal" placeholder="0"></div>' +
    '<div><label>Premium fare $ (' + (wn ? 'Business Select' : 'First') + ')</label><input id="bm_prem" type="number" inputmode="decimal" placeholder="0"></div></div>' +
    '<div class="bm-row"><div><label>Bag fee $ (each way)</label><input id="bm_bag" type="number" value="' + (wn ? 45 : 40) + '"></div>' +
    '<div><label>Overweight fee $ (each way)</label><input id="bm_ow" type="number" value="100"></div></div>' +
    '<div class="bm-row"><div><label>Premium includes free bag?</label><select id="bm_free"><option value="yes">Yes</option><option value="no">No</option></select></div>' +
    '<div><label>Premium waives overweight (70 lb)?</label><select id="bm_waive">' +
    (wn ? '<option value="no">No (Southwest)</option><option value="yes">Yes</option>'
        : '<option value="yes">Yes (legacy first class)</option><option value="no">No</option>') +
    '</select></div></div>' +
    '<button class="savebtn" style="margin-top:6px" onclick="calcBags()">RUN THE MATH</button>' +
    '<div class="bm-verdict" id="bm_out"></div>' +
    '<p class="dim" style="margin-top:8px">Round trip = both directions. Southwest 2026: 1st bag $45, overweight 51–70 lb +$100 on ANY fare. ' +
    'Free-bag workarounds: Choice Extra fare, A-List, or the Rapid Rewards credit card. ' +
    'On AA/Delta/United, first class bumps the weight allowance to 70 lb — the overweight fee disappears.</p>' +
    '</div>';

  html += '<div class="sectionhead">Weather</div><div id="wxWrap">' +
    '<div class="wxcard"><p class="dim">Loading forecast…</p></div></div>';
  el.innerHTML = html;
}
function calcBags() {
  const n = id => parseFloat(document.getElementById(id).value) || 0;
  const coach = n('bm_coach'), prem = n('bm_prem'), bag = n('bm_bag'), ow = n('bm_ow');
  const freeBag = document.getElementById('bm_free').value === 'yes';
  const waiveOw = document.getElementById('bm_waive').value === 'yes';
  const R = 2; // both directions
  const coachTotal = coach + (bag + ow) * R;
  const premTotal = prem + ((freeBag ? 0 : bag) + (waiveOw ? 0 : ow)) * R;
  const out = document.getElementById('bm_out');
  if (!coach && !prem) { out.textContent = 'Put the two fares in first.'; out.className = 'bm-verdict'; return; }
  const diff = Math.round(coachTotal - premTotal);
  if (diff >= 0) {
    out.className = 'bm-verdict win';
    out.textContent = '✅ PREMIUM WINS by $' + diff + ' — coach really costs $' + Math.round(coachTotal) + ', premium $' + Math.round(premTotal) + ' (round trip w/ your bag).';
  } else {
    out.className = 'bm-verdict lose';
    out.textContent = 'Coach wins by $' + Math.abs(diff) + ' — coach $' + Math.round(coachTotal) + ' vs premium $' + Math.round(premTotal) + ' (round trip w/ your bag).';
  }
}
function hub(ico, label, url, extra) {
  return '<a class="hubbtn ' + (extra || '') + '" href="' + url + '" target="_blank" rel="noopener">' +
    '<span class="ico">' + ico + '</span>' + label + '</a>';
}
function regionOf(ap) { return ap.state || ''; }

// =========================================================
// WEATHER — National Weather Service (free, no key)
// =========================================================
async function loadWeather() {
  if (!trip) return;
  const wrap = document.getElementById('wxWrap');
  if (!wrap) return;
  const out = state.dir === 'out';
  const codes = [out ? trip.from : trip.to, out ? trip.to : trip.from];
  let html = '';
  for (const code of codes) {
    const ap = AIRPORTS[code];
    if (!ap) continue;
    html += await wxCard(ap);
  }
  wrap.innerHTML = html || '<div class="wxcard"><p class="dim">No forecast available.</p></div>';
}
async function wxCard(ap) {
  try {
    const pt = await (await fetch('https://api.weather.gov/points/' + ap.lat + ',' + ap.lon)).json();
    const fc = await (await fetch(pt.properties.forecast)).json();
    const periods = fc.properties.periods.slice(0, 2);
    let card = '<div class="wxcard"><h3>' + ap.city + ' (' + ap.code + ')</h3>';
    periods.forEach(p => {
      card += '<p><b>' + p.name + ':</b> ' + p.temperature + '°' + p.temperatureUnit + ' — ' + p.shortForecast + '</p>';
    });
    try {
      const al = await (await fetch('https://api.weather.gov/alerts/active?point=' + ap.lat + ',' + ap.lon)).json();
      if (al.features && al.features.length) {
        card += '<p class="alert">⚠ ' + al.features[0].properties.event + '</p>';
      }
    } catch (e) {}
    card += '</div>';
    return card;
  } catch (e) {
    return '<div class="wxcard"><h3>' + ap.city + '</h3><p class="dim">Forecast unavailable (offline?).</p></div>';
  }
}

// =========================================================
// GEOFENCE — flips phases when you show up somewhere
// =========================================================
function startGeo() {
  if (!('geolocation' in navigator) || geoWatchId !== null) return;
  geoWatchId = navigator.geolocation.watchPosition(onPos, () => {}, {
    enableHighAccuracy: false, maximumAge: 60000, timeout: 30000
  });
}
function onPos(pos) {
  if (!trip || !phases.length) return;
  const { latitude: la, longitude: lo } = pos.coords;
  lastPos = { lat: la, lon: lo };
  const out = state.dir === 'out';
  const dep = AIRPORTS[out ? trip.from : trip.to];
  const arr = AIRPORTS[out ? trip.to : trip.from];
  const pid = phases[state.phase].id;
  // Arrived at departure airport while still on "drive" phase
  if (dep && pid === 'drive' && !geoFired.depart && distKm(la, lo, dep.lat, dep.lon) < 3) {
    geoFired.depart = true;
    banner('📍 You\'re at ' + dep.code + ' — moving to check-in.');
    setPhase(state.phase + 1, true);
  }
  // Landed: in-flight phase + GPS reappears near arrival airport
  if (arr && pid === 'flight' && !geoFired.arrive && distKm(la, lo, arr.lat, arr.lon) < 6) {
    geoFired.arrive = true;
    banner('🛬 Wheels down at ' + arr.code + ' — arrival mode.');
    setPhase(state.phase + 1, true);
  }
}
function distKm(a, b, c, d) {
  const R = 6371, dLa = (c - a) * Math.PI / 180, dLo = (d - b) * Math.PI / 180;
  const x = Math.sin(dLa / 2) ** 2 + Math.cos(a * Math.PI / 180) * Math.cos(c * Math.PI / 180) * Math.sin(dLo / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}
function banner(msg) {
  const b = document.getElementById('geoBanner');
  b.textContent = msg; b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 15000);
}

function saveTrip() {
  trip = {
    from: val('f_from'), to: val('f_to'), airline: val('f_airline'),
    flightOut: val('f_flightOut'), flightRet: val('f_flightRet'), precheck: val('f_precheck'),
    depDateOut: val('f_depDateOut'), depTimeOut: val('f_depTimeOut'),
    depDateRet: val('f_depDateRet'), depTimeRet: val('f_depTimeRet'), heavyBag: val('f_heavyBag'),
    rental: val('f_rental'), rentalConf: val('f_rentalConf'),
    hotelName: val('f_hotelName'), hotelAddr: val('f_hotelAddr'), hotelConf: val('f_hotelConf'),
    homeAddr: val('f_homeAddr')
  };
  localStorage.setItem('th_trip', JSON.stringify(trip));
  localStorage.setItem('th_tripSavedAt', String(Date.now()));
  state.phase = 0; state.dir = 'out'; lastSpokenPhase = -1;
  geoFired = { depart: false, arrive: false };
  saveState(); buildPhases(); renderHeader(); renderTrip(); renderHub();
  pushCloudTrip();
  speak('Trip saved. ' + AIRPORTS[trip.from].city + ' to ' + AIRPORTS[trip.to].city + '. Ready when you are.');
  showView('trip');
}
function val(id) { return document.getElementById(id).value.trim(); }

// =========================================================
// AI FILL — paste a confirmation email, Claude fills the form
// Same pattern as Job Tracker's receipt extraction.
// =========================================================
async function aiFill() {
  const status = document.getElementById('aiStatus');
  const text = val('f_paste');
  const key = val('f_apikey') || localStorage.getItem('th_apikey') || '';
  if (!text) { status.textContent = 'Paste a confirmation email in the box first.'; return; }
  if (!key) { status.textContent = 'Need your Anthropic API key (one time) — same one Job Tracker uses.'; return; }
  localStorage.setItem('th_apikey', key);
  status.textContent = '⏳ Reading the email…';
  const prompt =
`Extract travel booking details from the confirmation email below. Reply with ONLY a JSON object, no other text, using exactly these keys (null for anything not present):
{
 "from": "3-letter IATA code of outbound origin airport or null",
 "to": "3-letter IATA code of outbound destination airport or null",
 "airline": "2-letter IATA airline code (WN=Southwest, AA, DL, UA, AS, B6, NK, F9) or null",
 "flightOut": "outbound flight number, digits only, or null",
 "flightRet": "return flight number, digits only, or null",
 "depDateOut": "outbound departure date as YYYY-MM-DD, or null",
 "depTimeOut": "outbound scheduled departure time as 24h HH:MM local, or null",
 "depDateRet": "return departure date as YYYY-MM-DD, or null",
 "depTimeRet": "return scheduled departure time as 24h HH:MM local, or null",
 "flightConf": "airline confirmation code or null",
 "rental": "one of: enterprise, hertz, avis, budget, national, alamo, dollar, thrifty, sixt — or null",
 "rentalConf": "rental confirmation number or null",
 "hotelName": "hotel name or null",
 "hotelAddr": "hotel street address, city, state or null",
 "hotelConf": "hotel confirmation number or null"
}

EMAIL:
` + text;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 800,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) {
      const err = await res.text();
      status.textContent = '❌ API error ' + res.status + (res.status === 401 ? ' — check the API key.' : '. Try again.');
      console.error(err);
      return;
    }
    const data = await res.json();
    let raw = (data.content && data.content[0] && data.content[0].text || '').trim();
    raw = raw.replace(/^```(json)?/i, '').replace(/```$/, '').trim();
    applyExtracted(JSON.parse(raw), status);
  } catch (e) {
    status.textContent = '❌ Couldn\'t read that one (' + e.message + '). Try pasting just one confirmation at a time.';
  }
}

// Merge extracted fields into the form. Only fills what it found —
// never wipes something you already entered.
function applyExtracted(x, status) {
  const filled = [], warns = [];
  const set = (id, v) => { if (v) { document.getElementById(id).value = v; return true; } return false; };
  if (x.from) {
    if (AIRPORTS[x.from]) { set('f_from', x.from); filled.push('from ' + x.from); }
    else warns.push('no playbook for ' + x.from + ' yet');
  }
  if (x.to) {
    if (AIRPORTS[x.to]) { set('f_to', x.to); filled.push('to ' + x.to); }
    else warns.push('no playbook for ' + x.to + ' yet');
  }
  if (x.airline && AIRLINES[x.airline]) { set('f_airline', x.airline); filled.push(AIRLINES[x.airline].name); }
  if (set('f_flightOut', x.flightOut)) filled.push('flight out');
  if (set('f_flightRet', x.flightRet)) filled.push('flight back');
  if (set('f_depDateOut', x.depDateOut)) filled.push('dep date out');
  if (set('f_depTimeOut', x.depTimeOut)) filled.push('dep time out');
  if (set('f_depDateRet', x.depDateRet)) filled.push('dep date back');
  if (set('f_depTimeRet', x.depTimeRet)) filled.push('dep time back');
  if (x.rental && RENTALS[x.rental]) { set('f_rental', x.rental); filled.push(RENTALS[x.rental].name); }
  if (set('f_rentalConf', x.rentalConf)) filled.push('rental conf');
  if (set('f_hotelName', x.hotelName)) filled.push('hotel');
  if (set('f_hotelAddr', x.hotelAddr)) filled.push('hotel address');
  if (set('f_hotelConf', x.hotelConf)) filled.push('hotel conf');
  document.getElementById('f_paste').value = '';
  if (!filled.length) {
    status.textContent = '🤷 Didn\'t find booking details in that. Make sure the whole email came along in the paste.';
    return;
  }
  status.textContent = '✅ Filled: ' + filled.join(', ') + '.' +
    (warns.length ? ' ⚠ ' + warns.join('; ') + ' — leave the dropdown as-is or tell Claude to add that airport.' : '') +
    ' Check it over, add the next email, or hit SAVE TRIP.';
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
